<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cronograma PJSC 2026 - Customizável</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --success: #2ecc71;
            --danger: #e74c3c;
            --warning: #f39c12;
            --bg: #f4f7f6;
            --text: #333;
            --white: #fff;
            --border: #dcdde1;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            padding-top: 100px;
            padding-bottom: 60px;
        }

        /* BARRA FIXA */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: var(--primary);
            color: var(--white);
            padding: 15px 20px;
            z-index: 1000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .progress-container {
            max-width: 900px;
            margin: 0 auto;
        }

        .progress-labels {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            margin-bottom: 8px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .progress-bg {
            background: rgba(255,255,255,0.1);
            height: 12px;
            border-radius: 6px;
            overflow: hidden;
        }

        #progress-fill {
            height: 100%;
            background: var(--success);
            width: 0%;
            transition: width 0.5s ease;
        }

        /* CONTEÚDO */
        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 15px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 20px;
        }

        .day-card {
            background: var(--white);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid var(--border);
            position: relative;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s;
        }

        .card-header {
            border-bottom: 2px solid var(--accent);
            padding-bottom: 10px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .date-info h2 { font-size: 1.1rem; color: var(--primary); }
        .date-info span { font-size: 0.75rem; text-transform: uppercase; color: var(--accent); font-weight: bold; }

        /* DISCIPLINAS */
        .subject-list { list-style: none; }

        .subject-item {
            display: flex;
            align-items: center;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 8px;
            margin-bottom: 8px;
            border-left: 5px solid var(--warning);
            transition: 0.2s;
        }

        .subject-item.hw { border-left-color: var(--danger); }
        .subject-item.completed { background: #e8f8f0; opacity: 0.8; }

        .check-box { margin-right: 10px; }
        .check-box input { width: 18px; height: 18px; accent-color: var(--success); cursor: pointer; }

        .subject-name { flex-grow: 1; font-size: 0.9rem; font-weight: 600; }
        .completed .subject-name { text-decoration: line-through; color: #7f8c8d; }

        .item-actions { display: flex; gap: 5px; opacity: 0; transition: 0.2s; }
        .subject-item:hover .item-actions { opacity: 1; }

        .btn-icon {
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
            font-size: 12px;
        }
        .btn-edit { color: var(--accent); }
        .btn-delete { color: var(--danger); }
        .btn-add { 
            background: var(--accent); 
            color: white; 
            font-size: 11px; 
            padding: 4px 8px; 
            border-radius: 4px; 
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        /* MODAL */
        #modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        .modal {
            background: white;
            padding: 25px;
            border-radius: 12px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        .modal h3 { margin-bottom: 15px; font-size: 1.2rem; }
        .modal input {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
            border-radius: 6px;
        }
        .modal-btns { display: flex; justify-content: flex-end; gap: 10px; }
        .btn { padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; }
        .btn-save { background: var(--success); color: white; }
        .btn-cancel { background: #eee; color: #666; }

        @media (max-width: 600px) {
            body { padding-top: 120px; }
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <div class="progress-container">
            <div class="progress-labels">
                <span>Progresso Total</span>
                <span id="perc-val">0%</span>
            </div>
            <div class="progress-bg">
                <div id="progress-fill"></div>
            </div>
            <div style="text-align: center; font-size: 0.7rem; margin-top: 5px; opacity: 0.8;">
                <span id="done-val">0</span> de <span id="total-val">0</span> sessões
            </div>
        </div>
    </header>

    <main>
        <div style="text-align:center; margin-bottom: 30px;">
            <h1 style="color: var(--primary);">Plano de Estudos PJSC 2026</h1>
            <p style="color: #666;">Gerencie e edite suas disciplinas livremente</p>
        </div>
        <div id="main-grid" class="grid"></div>
    </main>

    <!-- MODAL PARA EDIÇÃO/INCLUSÃO -->
    <div id="modal-overlay">
        <div class="modal">
            <h3 id="modal-title">Editar Disciplina</h3>
            <input type="text" id="subject-input" placeholder="Nome da disciplina...">
            <div style="margin-bottom: 15px;">
                <label style="font-size: 0.85rem; font-weight: bold;">
                    <input type="checkbox" id="hw-input"> Peso Alto (Destaque Vermelho)
                </label>
            </div>
            <div class="modal-btns">
                <button class="btn btn-cancel" onclick="closeModal()">Cancelar</button>
                <button class="btn btn-save" onclick="saveModal()">Confirmar</button>
            </div>
        </div>
    </div>

    <script>
        const highWeightNames = ["Língua Portuguesa", "Direito Constitucional", "Direito Administrativo", "Direito Civil", "Direito Processual Civil"];
        const standardWeightNames = ["Legislação Institucional do PJSC", "Ética e Gestão no Serviço Público", "Noções de Informática e Proteção de Dados", "Direitos Humanos e acesso à Justiça", "Direito Penal", "Direito Processual Penal", "Direitos Humanos e Tutela Coletiva", "Direito do Consumidor"];

        let scheduleData = [];
        let currentEdit = { dayIdx: null, subIdx: null }; // null subIdx significa inclusão

        function init() {
            const savedData = localStorage.getItem('pjsc_custom_schedule_v3');
            if (savedData) {
                scheduleData = JSON.parse(savedData);
            } else {
                generateInitialData();
            }
            render();
        }

        function generateInitialData() {
            const startDate = new Date(2026, 3, 2);
            const endDate = new Date(2026, 5, 27);
            let hwPtr = 0;
            let swPtr = 0;
            let current = new Date(startDate);

            while (current <= endDate) {
                const dw = current.getDay();
                const isWeekend = (dw === 0 || dw === 6);
                const slots = isWeekend ? 4 : 2;
                
                const dayObj = {
                    date: current.toLocaleDateString('pt-BR'),
                    weekday: current.toLocaleDateString('pt-BR', { weekday: 'long' }),
                    subjects: []
                };

                for (let i = 0; i < slots; i++) {
                    let name = "";
                    let isHW = false;
                    if (slots === 2) {
                        if (i === 0) { name = highWeightNames[hwPtr % highWeightNames.length]; hwPtr++; isHW = true; }
                        else { name = standardWeightNames[swPtr % standardWeightNames.length]; swPtr++; }
                    } else {
                        if (i < 2) { name = highWeightNames[hwPtr % highWeightNames.length]; hwPtr++; isHW = true; }
                        else { name = standardWeightNames[swPtr % standardWeightNames.length]; swPtr++; }
                    }
                    dayObj.subjects.push({ name, isHW, completed: false });
                }
                scheduleData.push(dayObj);
                current.setDate(current.getDate() + 1);
            }
            save();
        }

        function render() {
            const grid = document.getElementById('main-grid');
            grid.innerHTML = "";
            let total = 0;
            let done = 0;

            scheduleData.forEach((day, dIdx) => {
                const card = document.createElement('div');
                card.className = 'day-card';
                
                let subjectsHtml = "";
                day.subjects.forEach((sub, sIdx) => {
                    total++;
                    if (sub.completed) done++;
                    subjectsHtml += `
                        <li class="subject-item ${sub.isHW ? 'hw' : ''} ${sub.completed ? 'completed' : ''}">
                            <div class="check-box">
                                <input type="checkbox" ${sub.completed ? 'checked' : ''} onchange="toggle(${dIdx}, ${sIdx})">
                            </div>
                            <span class="subject-name">${sub.name}</span>
                            <div class="item-actions">
                                <button class="btn-icon btn-edit" title="Editar" onclick="openModal(${dIdx}, ${sIdx})">✎</button>
                                <button class="btn-icon btn-delete" title="Remover" onclick="removeSubject(${dIdx}, ${sIdx})">✖</button>
                            </div>
                        </li>
                    `;
                });

                card.innerHTML = `
                    <div class="card-header">
                        <div class="date-info">
                            <span>${day.weekday}</span>
                            <h2>${day.date}</h2>
                        </div>
                        <button class="btn-add" onclick="openModal(${dIdx})">+ Matéria</button>
                    </div>
                    <ul class="subject-list">${subjectsHtml}</ul>
                `;
                grid.appendChild(card);
            });

            updateProgress(done, total);
        }

        function toggle(dIdx, sIdx) {
            scheduleData[dIdx].subjects[sIdx].completed = !scheduleData[dIdx].subjects[sIdx].completed;
            save();
            render();
        }

        function openModal(dIdx, sIdx = null) {
            currentEdit = { dayIdx: dIdx, subIdx: sIdx };
            const input = document.getElementById('subject-input');
            const hwInput = document.getElementById('hw-input');
            const title = document.getElementById('modal-title');
            
            if (sIdx !== null) {
                title.innerText = "Editar Disciplina";
                input.value = scheduleData[dIdx].subjects[sIdx].name;
                hwInput.checked = scheduleData[dIdx].subjects[sIdx].isHW;
            } else {
                title.innerText = "Adicionar Disciplina";
                input.value = "";
                hwInput.checked = false;
            }
            
            document.getElementById('modal-overlay').style.display = 'flex';
            input.focus();
        }

        function closeModal() {
            document.getElementById('modal-overlay').style.display = 'none';
        }

        function saveModal() {
            const name = document.getElementById('subject-input').value.trim();
            const isHW = document.getElementById('hw-input').checked;
            if (!name) return;

            const { dayIdx, subIdx } = currentEdit;

            if (subIdx !== null) {
                scheduleData[dayIdx].subjects[subIdx].name = name;
                scheduleData[dayIdx].subjects[subIdx].isHW = isHW;
            } else {
                scheduleData[dayIdx].subjects.push({ name, isHW, completed: false });
            }

            save();
            closeModal();
            render();
        }

        function removeSubject(dIdx, sIdx) {
            scheduleData[dIdx].subjects.splice(sIdx, 1);
            save();
            render();
        }

        function save() {
            localStorage.setItem('pjsc_custom_schedule_v3', JSON.stringify(scheduleData));
        }

        function updateProgress(done, total) {
            const perc = total === 0 ? 0 : Math.round((done / total) * 100);
            document.getElementById('progress-fill').style.width = perc + '%';
            document.getElementById('perc-val').innerText = perc + '%';
            document.getElementById('done-val').innerText = done;
            document.getElementById('total-val').innerText = total;
        }

        window.onload = init;
    </script>
</body>
</html>
