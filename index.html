<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cronograma PJSC 2026 - Inteligente</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --success: #2ecc71;
            --bg: #f4f7f6;
            --text: #333;
            --white: #fff;
            --border: #dcdde1;
            --hw-color: #e74c3c; /* Cor para disciplinas de alto peso */
            --sw-color: #f39c12; /* Cor para disciplinas padrão */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            padding-top: 90px;
            padding-bottom: 40px;
        }

        /* BARRA FIXA */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: var(--primary);
            color: var(--white);
            padding: 15px 20px;
            z-index: 1000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .progress-container {
            max-width: 900px;
            margin: 0 auto;
        }

        .progress-labels {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            margin-bottom: 8px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .progress-bg {
            background: rgba(255,255,255,0.1);
            height: 12px;
            border-radius: 6px;
            overflow: hidden;
        }

        #progress-fill {
            height: 100%;
            background: var(--success);
            width: 0%;
            transition: width 0.5s ease;
        }

        /* CONTEÚDO */
        main {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 15px;
        }

        .title-box {
            text-align: center;
            margin-bottom: 30px;
        }

        .title-box h1 {
            color: var(--primary);
            font-size: 1.6rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }

        .day-card {
            background: var(--white);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: transform 0.2s;
        }

        .day-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.05);
        }

        .card-header {
            border-bottom: 2px solid var(--accent);
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        .date-txt {
            font-size: 1.1rem;
            font-weight: 800;
            color: var(--primary);
        }

        .weekday-txt {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--accent);
            font-weight: 700;
        }

        /* DISCIPLINAS */
        .subject-item {
            display: flex;
            align-items: center;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 8px;
            margin-bottom: 10px;
            cursor: pointer;
            border-left: 5px solid transparent;
            transition: 0.2s;
        }

        .subject-item:hover {
            background: #eef1f4;
        }

        .subject-item.hw { border-left-color: var(--hw-color); }
        .subject-item.sw { border-left-color: var(--sw-color); }

        .subject-item.completed {
            background: #e8f8f0;
            opacity: 0.8;
        }

        .check-box {
            margin-right: 12px;
        }

        .check-box input {
            width: 18px;
            height: 18px;
            accent-color: var(--success);
            cursor: pointer;
        }

        .subject-name {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text);
        }

        .completed .subject-name {
            text-decoration: line-through;
            color: #7f8c8d;
        }

        .weight-tag {
            font-size: 0.65rem;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: auto;
            text-transform: uppercase;
            font-weight: bold;
        }

        .hw .weight-tag { background: #fee; color: var(--hw-color); }
        .sw .weight-tag { background: #fff4e5; color: var(--sw-color); }

        @media (max-width: 600px) {
            body { padding-top: 110px; }
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <div class="progress-container">
            <div class="progress-labels">
                <span>Progresso das Disciplinas</span>
                <span id="perc-val">0%</span>
            </div>
            <div class="progress-bg">
                <div id="progress-fill"></div>
            </div>
            <div style="text-align: center; font-size: 0.7rem; margin-top: 5px; opacity: 0.8;">
                <span id="done-val">0</span> de <span id="total-val">0</span> sessões concluídas
            </div>
        </div>
    </header>

    <main>
        <div class="title-box">
            <h1>Plano PJSC 2026</h1>
            <p>Foco Estratégico: Distribuição por Pesos</p>
        </div>

        <div id="main-grid" class="grid"></div>
    </main>

    <script>
        // CONFIGURAÇÃO DAS DISCIPLINAS
        const highWeight = [
            "Língua Portuguesa",
            "Direito Constitucional",
            "Direito Administrativo",
            "Direito Civil e Direito do Consumidor",
            "Direito Processual Civil"
        ];

        const standardWeight = [
            "Legislação Institucional do PJSC",
            "Ética e Gestão no Serviço Público",
            "Noções de Informática e Proteção de Dados",
            "Direitos Humanos e acesso à Justiça",
            "Direito Penal",
            "Direito Processual Penal",
            "Direitos Humanos e Tutela Coletiva"
        ];

        const startDate = new Date(2026, 3, 2); // 02/04/2026
        const endDate = new Date(2026, 5, 27);  // 27/06/2026

        function generateSchedule() {
            const grid = document.getElementById('main-grid');
            let currentDate = new Date(startDate);
            let dayIdx = 0;
            
            // Ponteiros para rotação infinita
            let hwPtr = 0;
            let swPtr = 0;

            while (currentDate <= endDate) {
                const dw = currentDate.getDay(); // 0: Dom, 6: Sab
                const isWeekend = (dw === 0 || dw === 6);
                
                // Regra: 2 (seg-sex) | 4 (sab-dom)
                const slots = isWeekend ? 4 : 2;

                const card = document.createElement('div');
                card.className = 'day-card';
                
                const dStr = currentDate.toLocaleDateString('pt-BR');
                const wStr = currentDate.toLocaleDateString('pt-BR', { weekday: 'long' });

                let html = `
                    <div class="card-header">
                        <div class="weekday-txt">${wStr}</div>
                        <div class="date-txt">${dStr}</div>
                    </div>
                `;

                for (let i = 0; i < slots; i++) {
                    let isHW = false;
                    let subject = "";

                    // Distribuição Inteligente:
                    // Se for 2 slots (Semana): 1 HW e 1 SW.
                    // Se for 4 slots (Fim de semana): 2 HW e 2 SW.
                    if (slots === 2) {
                        if (i === 0) { isHW = true; subject = highWeight[hwPtr % highWeight.length]; hwPtr++; }
                        else { isHW = false; subject = standardWeight[swPtr % standardWeight.length]; swPtr++; }
                    } else {
                        if (i < 2) { isHW = true; subject = highWeight[hwPtr % highWeight.length]; hwPtr++; }
                        else { isHW = false; subject = standardWeight[swPtr % standardWeight.length]; swPtr++; }
                    }

                    const uid = `s-${dayIdx}-${i}`;
                    html += `
                        <div class="subject-item ${isHW ? 'hw' : 'sw'}" id="li-${uid}" onclick="toggle('${uid}')">
                            <div class="check-box">
                                <input type="checkbox" id="${uid}" onchange="event.stopPropagation(); toggle('${uid}')">
                            </div>
                            <span class="subject-name">${subject}</span>
                            <span class="weight-tag">${isHW ? 'Peso Alto' : 'Base'}</span>
                        </div>
                    `;
                }

                card.innerHTML = html;
                grid.appendChild(card);

                currentDate.setDate(currentDate.getDate() + 1);
                dayIdx++;
            }

            loadProgress();
            updateStats();
        }

        window.toggle = function(id) {
            const cb = document.getElementById(id);
            const li = document.getElementById('li-' + id);
            
            if (event.target.type !== 'checkbox') {
                cb.checked = !cb.checked;
            }

            if (cb.checked) li.classList.add('completed');
            else li.classList.remove('completed');
            
            saveProgress();
            updateStats();
        };

        function updateStats() {
            const total = document.querySelectorAll('input[type="checkbox"]').length;
            const done = document.querySelectorAll('input[type="checkbox"]:checked').length;
            const perc = total === 0 ? 0 : Math.round((done / total) * 100);

            document.getElementById('progress-fill').style.width = perc + '%';
            document.getElementById('perc-val').innerText = perc + '%';
            document.getElementById('done-val').innerText = done;
            document.getElementById('total-val').innerText = total;
        }

        function saveProgress() {
            const states = {};
            document.querySelectorAll('input[type="checkbox"]').forEach(cb => {
                states[cb.id] = cb.checked;
            });
            localStorage.setItem('pjsc_smart_v2', JSON.stringify(states));
        }

        function loadProgress() {
            const saved = localStorage.getItem('pjsc_smart_v2');
            if (saved) {
                const states = JSON.parse(saved);
                for (const id in states) {
                    const cb = document.getElementById(id);
                    if (cb) {
                        cb.checked = states[id];
                        if (cb.checked) document.getElementById('li-' + id).classList.add('completed');
                    }
                }
            }
        }

        window.onload = generateSchedule;
    </script>
</body>
</html>
